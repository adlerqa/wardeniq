# MongoDB Search (mongot) — self-managed. This OVERRIDES the official image's
# shipped default config (mounted over /mongot-community/config.default.yml).
# The schema mirrors that shipped sample exactly; only the hosts/ports are set
# for our container network (the sample uses localhost).
syncSource:
  replicaSet:
    hostAndPort: "mongod1.warden-net:27017"   # single-node RS seed (not localhost)
    username: mongotUser                        # created with the searchCoordinator role
    passwordFile: "/tmp/wardeniq-mongot-secrets/passwordFile"   # entrypoint copies the mounted secret here as 0400 (mongot rejects world-readable secret files)
    tls: false
storage:
  dataPath: "/var/lib/mongot"
server:
  grpc:
    address: "mongot.warden-net:27027"          # must match mongod's mongotHost / searchIndexManagementHostAndPort
    tls:
      mode: "disabled"
metrics:
  enabled: true
  address: "0.0.0.0:9946"
healthCheck:
  address: "mongot.warden-net:8080"
logging:
  verbosity: INFO

# MongoDB Community Edition — replica-set member wired to the self-managed
# mongot search process. (Migrated from Percona Server for MongoDB.)
#
# The two setParameter values are the OFFICIAL way to wire mongod → mongot
# (see MongoDB docs: "Deploy a Replica Set … for mongot"). We intentionally do
# NOT set the Percona-specific flags (useGrpcForSearch,
# skipAuthenticationToSearchIndexManagementServer) — they don't exist on
# official Community mongod. The gRPC transport is implied by mongot's port.
storage:
  dbPath: /data/db
net:
  port: 27017
  bindIpAll: true
setParameter:
  mongotHost: mongot.warden-net:27027
  searchIndexManagementHostAndPort: mongot.warden-net:27027
  # mongot 0.65 speaks gRPC only; without this, mongod uses the old wire protocol
  # and mongot rejects it ("HTTP/2 client preface … missing or corrupt").
  useGrpcForSearch: true
replication:
  replSetName: rs0
# Beta runs the replica set WITHOUT auth for zero-config onboarding, matching the
# previous setup. To harden (production), add a keyfile + authorization: enabled
# here and on every node (see docs "Production hardening" in CLAUDE.md).

[pytest]
# The app is a flat package of top-level modules (coverage.py, store.py, ...),
# so put app/ on sys.path for imports like `import coverage`.
pythonpath = app
testpaths = tests
addopts = -q
markers =
    dbintegration: requires a live MongoDB (set MONGO_TEST_URI); run via the
        dedicated "db-integration-tests" CI job, or locally with
        `MONGO_TEST_URI=mongodb://localhost:27017 pytest -m dbintegration`.
        Excluded from the default `pytest` run (see -m in CI's unit-test job).
